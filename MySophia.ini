;===== 规则集（顺序=优先级+匹配效率）=====
; 排序原则：
; ① 局域网/直连白名单最先（精准，命中快）
; ② 国内域名直连（流量最大，早命中省延迟）
; ③ 高频代理业务（Google/Telegram/AI等）
; ④ 其他代理规则
; ⑤ 大规则集最后（Advertising数千条，放后面减少无效扫描）
; ⑥ FINAL兜底

