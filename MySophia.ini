custom_proxy_group=🇸🇬 新加坡自动`url-test`(新加坡|狮城|SG|Singapore|🇸🇬)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇯🇵 日本选择`select`(日本|日|JP|Japan|🇯🇵)
custom_proxy_group=🇯🇵 日本自动`url-test`(日本|日|JP|Japan|🇯🇵)`http://www.gstatic.com/generate_204`300,,50

