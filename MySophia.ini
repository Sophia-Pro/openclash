[custom]

; ╔══════════════════════════════════════════════════════════╗
;   Sophia 自用订阅转换模板 v4.0
;   适配 subconverter / sub-web / OpenClash（手机+PC）
;   更新日期: 2026-03
;
;   ✅ 防泄露：漏网之鱼走节点，境外流量不裸奔
;   ✅ IPv6：全面覆盖，防 IPv6 绕过代理泄露
;   ✅ 移动端：社交/支付/手游/省电优化
;   ✅ Google Pay 裸IP补丁内联
;   ✅ 自动组过滤倍率/信息节点
;   ✅ 故障转移，断线自动切换
;   ✅ 流媒体独立分组
;   ✅ 广告拦截强化（含App内广告）
;   ✅ 游戏：40+ 游戏/平台，下载直连不影响速度
; ╚══════════════════════════════════════════════════════════╝

enable_rule_generator=true
overwrite_original_rules=true

; ============================================================
;   策略组
; ============================================================

; ── 顶层入口 ──────────────────────────────────────────────
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔄 故障转移`[]🇭🇰 香港选择`[]🇸🇬 新加坡选择`[]🇯🇵 日本选择`[]🇨🇳 台湾选择`[]🇺🇸 美国选择`[]DIRECT

; ── 自动 & 故障转移 ───────────────────────────────────────
; 排除所有非代理节点：倍率/专线/流量信息/套餐/到期提示等
custom_proxy_group=♻️ 自动选择`url-test`^(?!.*?(0\.5x|1\.5x|2x|3x|5x|8x|10x|倍率|专线|IPLC|中转|剩余|到期|官网|套餐|重置|流量|GB|Traffic|Expire|Renew)).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔄 故障转移`fallback`^(?!.*?(0\.5x|1\.5x|2x|3x|5x|8x|10x|倍率|专线|IPLC|中转|剩余|到期|官网|套餐|重置|流量|GB|Traffic|Expire|Renew)).*`http://www.gstatic.com/generate_204`30,,2000

; ── 核心业务 ──────────────────────────────────────────────
custom_proxy_group=🤖 AI服务`select`[]🇺🇸 美国选择`[]🇺🇸 美国自动`[]🇯🇵 日本选择`[]🇯🇵 日本自动`[]🇸🇬 新加坡选择`[]🇸🇬 新加坡自动`[]🚀 节点选择
custom_proxy_group=🔍 Google`select`[]🇭🇰 香港选择`[]🇭🇰 香港自动`[]🇸🇬 新加坡选择`[]🇸🇬 新加坡自动`[]🇯🇵 日本选择`[]🇯🇵 日本自动`[]🇺🇸 美国选择`[]🚀 节点选择
custom_proxy_group=📹 YouTube`select`[]🇭🇰 香港选择`[]🇭🇰 香港自动`[]🇸🇬 新加坡选择`[]🇯🇵 日本选择`[]🇺🇸 美国选择`[]🚀 节点选择
custom_proxy_group=🐦 Telegram`select`[]🇸🇬 新加坡选择`[]🇸🇬 新加坡自动`[]🇭🇰 香港选择`[]🇭🇰 香港自动`[]🚀 节点选择
custom_proxy_group=🪟 微软服务`select`[]DIRECT`[]🚀 节点选择`[]🇭🇰 香港选择`[]🇺🇸 美国选择
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🚀 节点选择`[]🇭🇰 香港选择`[]🇺🇸 美国选择
custom_proxy_group=📘 GitHub`select`[]🚀 节点选择`[]🇭🇰 香港选择`[]🇺🇸 美国选择`[]DIRECT

; ── 社交媒体（移动端高频使用）────────────────────────────
custom_proxy_group=📱 社交媒体`select`[]🚀 节点选择`[]🇭🇰 香港选择`[]🇭🇰 香港自动`[]🇸🇬 新加坡选择`[]🇯🇵 日本选择`[]🇺🇸 美国选择

; ── 支付（独立分组，保障支付安全稳定）───────────────────
custom_proxy_group=💳 PayPal`select`[]🇺🇸 美国选择`[]🇺🇸 美国自动`[]🇭🇰 香港选择`[]🇸🇬 新加坡选择`[]🚀 节点选择

; ── 流媒体 ────────────────────────────────────────────────
custom_proxy_group=🎬 Netflix`select`[]🇭🇰 香港选择`[]🇸🇬 新加坡选择`[]🇯🇵 日本选择`[]🇺🇸 美国选择`[]🚀 节点选择
custom_proxy_group=🎬 Disney+`select`[]🇭🇰 香港选择`[]🇸🇬 新加坡选择`[]🇯🇵 日本选择`[]🇺🇸 美国选择`[]🚀 节点选择
custom_proxy_group=🎵 Spotify`select`[]🇭🇰 香港选择`[]🇸🇬 新加坡选择`[]🇯🇵 日本选择`[]🇺🇸 美国选择`[]DIRECT`[]🚀 节点选择

; ── 全球/直连/拦截 ────────────────────────────────────────
custom_proxy_group=🌍 国外网站`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港选择`[]🇸🇬 新加坡选择`[]🇯🇵 日本选择`[]🇺🇸 美国选择
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT

; ── 漏网之鱼（防泄露）────────────────────────────────────
; 默认走节点：防止未命中的境外域名/IPv6 直连泄露真实IP
; 确认是国内漏网流量时，可在面板手动切换为 DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]DIRECT`[]🇭🇰 香港选择

; ── 游戏策略组 ────────────────────────────────────────────
; 对战/登录服务器：全节点最低延迟
; 手机省电：120秒刷新（PC可改为60）
custom_proxy_group=🎮 游戏加速`select`[]🎮 游戏最优`[]🇭🇰 香港自动`[]🇸🇬 新加坡自动`[]🇯🇵 日本自动`[]🇨🇳 台湾自动`[]🇺🇸 美国自动`[]🇭🇰 香港选择`[]🇸🇬 新加坡选择`[]🇯🇵 日本选择`[]🇺🇸 美国选择
custom_proxy_group=🎮 游戏最优`url-test`.*`http://www.gstatic.com/generate_204`120,,80
; 平台商店：仅网页/登录，下载由直连规则优先拦截
custom_proxy_group=🎮 游戏平台`select`[]🚀 节点选择`[]🇭🇰 香港选择`[]🇭🇰 香港自动`[]🇯🇵 日本选择`[]🇸🇬 新加坡选择`[]DIRECT

