; ============================================================
;   基础配置
; ============================================================

[clash_rule_providers]

[profile]
profile-update-interval=24
allow-lan=false
mode=rule
log-level=info
external-controller=127.0.0.1:9090
unified-delay=true

; DNS：只用国内服务器，避免 8.8.8.8 被污染/超时
; 境外域名由代理节点内部的远端 DNS 解析，不在本机查询
dns_address=119.29.29.29,223.5.5.5,119.28.28.28
dns_ipv6=true
fake-ip-range=198.18.0.1/16
; IPv6 fake-ip（防止 IPv6 流量在代理建立前泄出）
fake-ip-range-v6=fc00::/18
dns_fallback_filter=true
